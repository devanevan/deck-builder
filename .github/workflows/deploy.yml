name: Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  get-affected:
    runs-on: ubuntu-latest
    outputs:
      has-affected-apps: ${{ steps.affected.outputs.has-affected-apps }}
      matrix-apps: ${{ steps.affected.outputs.matrix-apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine affected apps
        id: affected
        uses: ./.github/actions/get-affected
        with:
          base-sha: ${{ github.event.before }}

  deploy:
    name: Deploy (${{ matrix.app.target }})
    needs: get-affected
    if: needs.get-affected.outputs.has-affected-apps == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.get-affected.outputs.matrix-apps) }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Deploy Lambda functions (Serverless Framework)
        if: matrix.app.target == 'functions'
        run: pnpm deploy:functions

      - name: Build web app
        if: matrix.app.target == 'app'
        run: pnpm export:web

      - name: Zip web app artifact
        if: matrix.app.target == 'app'
        run: cd apps/app/dist && zip -rq ../../../deploy.zip .

      - name: Deploy web app to Amplify
        if: matrix.app.target == 'app'
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
        run: |
          DEPLOYMENT=$(aws amplify create-deployment --app-id "$AMPLIFY_APP_ID" --branch-name main)
          UPLOAD_URL=$(echo "$DEPLOYMENT" | jq -r '.zipUploadUrl')
          JOB_ID=$(echo "$DEPLOYMENT" | jq -r '.jobId')

          curl -sSf -X PUT -T deploy.zip "$UPLOAD_URL"

          aws amplify start-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name main \
            --job-id "$JOB_ID"
