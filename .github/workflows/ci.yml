name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  get-affected:
    runs-on: ubuntu-latest
    outputs:
      has-affected: ${{ steps.affected.outputs.has-affected }}
      matrix: ${{ steps.affected.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine affected packages
        id: affected
        uses: ./.github/actions/get-affected
        with:
          base-sha: ${{ github.event.pull_request.base.sha }}

  ci:
    name: CI (${{ matrix.package.name }})
    needs: get-affected
    if: needs.get-affected.outputs.has-affected == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.get-affected.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter "${{ matrix.package.name }}" run build --if-present

      - name: Lint
        run: pnpm exec biome lint ${{ matrix.package.path }}

      - name: Test
        run: pnpm --filter "${{ matrix.package.name }}" run test --if-present
